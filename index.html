<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TracAuto v2 web platform para autenticacion, identidad y gestion multi-organizacion."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>TracAuto v2 Web</title>
  </head>
  <body>
    <script>
      // Anti-flash: apply persisted theme before React mounts
      (function() {
        try {
          var p = JSON.parse(localStorage.getItem('tracauto-preferences') || '{}');
          var s = p && p.state;
          if (s && s.theme && s.theme !== 'dark') {
            document.documentElement.setAttribute('data-theme', s.theme);
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
